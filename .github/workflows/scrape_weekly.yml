name: MAPlanning Retail Intelligence

on:
  # ── Job 1: Scrape every Sunday at 02:00 UTC ──────────────
  # ── Job 2: Email every Monday at 10:00 UTC ───────────────
  schedule:
    - cron: "0 2 * * 0"    # Sunday 2AM  → scraper
    - cron: "0 10 * * 1"   # Monday 10AM → email digest

  workflow_dispatch:       # Manual trigger from Actions tab

jobs:
  # ════════════════════════════════════════════════════════
  # JOB 1 — Scrape and write to Google Sheets
  # Runs: Sunday 02:00 UTC
  # ════════════════════════════════════════════════════════
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    # Only run on Sunday schedule or manual trigger
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && contains(github.event.schedule, '0 2 * * 0'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: python maplanning_v16.py

  # ════════════════════════════════════════════════════════
  # JOB 2 — Email digest of last 7 days
  # Runs: Monday 10:00 UTC  (independently — doesn't need scraper to finish)
  # ════════════════════════════════════════════════════════
  email:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run on Monday schedule or manual trigger
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && contains(github.event.schedule, '0 10 * * 1'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send email digest
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GMAIL_FROM:               ${{ secrets.GMAIL_FROM }}
          GMAIL_APP_PASSWORD:       ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:                 ${{ secrets.GMAIL_TO }}
        run: python email_digest.py
